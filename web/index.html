<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页资源爬虫</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}
#sidebar{width:240px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;padding:16px}
#sidebar h2{font-size:14px;margin-bottom:12px}
#dl-tabs{display:flex;margin-bottom:8px}
#dl-tabs span{flex:1;text-align:center;padding:6px;font-size:12px;cursor:pointer;border-radius:4px}
#dl-tabs .active{background:#238636;color:white}
#dl-list{flex:1;overflow-y:auto;font-size:11px}
#dl-list div{padding:4px 0;border-bottom:1px solid #21262d}
#main{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px}
#url-bar{display:flex;gap:8px}
#url-input{flex:1;padding:10px 14px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;outline:none}
#url-input:focus{border-color:#58a6ff}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-fetch{background:#238636;color:white}
.btn-fetch:hover{background:#2ea043}
.btn-dl{background:#1f6feb;color:white}
.btn-dl:hover{background:#388bfd}
.btn-stop{background:#da3633;color:white}
.btn-stop:hover{background:#f85149}
#content{display:flex;flex:1;gap:12px;min-height:0}
#res-panel{flex:2;display:flex;flex-direction:column}
#res-toolbar{display:flex;gap:6px;margin-bottom:8px}
#res-list{flex:1;overflow-y:auto;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px}
.res-item{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px}
.res-item:hover{background:#21262d}
.res-item input{margin-right:4px}
.res-type{color:#8b949e;font-size:10px;min-width:50px}
.res-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#preview{flex:1;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;overflow-y:auto;font-size:12px}
#status{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px}
#progress{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden;display:none}
#progress-bar{height:100%;background:#1f6feb;transition:width .3s}
</style>
</head>
<body>

<div id="sidebar">
  <h2>📥 下载管理</h2>
  <div id="dl-tabs"><span class="active" onclick="switchTab(1)">下载中</span><span onclick="switchTab(2)">已完成</span></div>
  <div id="dl-list"></div>
  <button class="btn-stop" onclick="stopAll()" style="margin-top:8px">⏹ 全部停止</button>
</div>

<div id="main">
  <div id="url-bar">
    <input id="url-input" placeholder="输入网址，多个用逗号或换行分隔，支持 asmr.one、asmr18.fans 等">
    <button id="btn-fetch" class="btn-fetch" onclick="fetchRes()">🔍 抓取</button>
  </div>

  <div id="content">
    <div id="res-panel">
      <div id="res-toolbar">
        <button onclick="selAll()" style="background:#21262d;color:#c9d1d9">☑ 全选</button>
        <button onclick="selNone()" style="background:#21262d;color:#c9d1d9">☐ 取消</button>
        <span id="sel-count" style="font-size:12px;color:#8b949e">已选 0</span>
        <span style="flex:1"></span>
        <button class="btn-dl" onclick="startDL()">⬇ 下载选中</button>
      </div>
      <div id="res-list"></div>
    </div>
    <div id="preview">点击资源查看详情</div>
  </div>

  <div id="status">
    <span id="status-text">就绪</span>
    <div id="progress"><div id="progress-bar"></div></div>
    <span id="status-pct"></span>
  </div>
</div>

<script>
let resources=[],dlLog=[],fetching=false,downloading=false;
let dlTab=1;

async function fetchAPI(path,opts={}){
  let res=await fetch('http://localhost:18777'+path,{
    headers:{'Content-Type':'application/json'},...opts
  });
  return res.json();
}

async function fetchRes(){
  if(fetching)return;
  let url=urlInput.value.trim(); if(!url)return;
  let urls=url.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);
  if(!urls.length)return;

  fetching=true; resources=[]; renderList();
  setStatus('⏳ 抓取中...','#d29922');
  btnFetch.disabled=true;

  try{
    let data=await fetchAPI('/fetch',{method:'POST',body:JSON.stringify({urls})});
    resources=data.resources||[];
    renderList();
    setStatus(`✅ 找到 ${resources.length} 个资源`,'#3fb950');
  }catch(e){setStatus('❌ 抓取失败: '+e.message,'#f85149')}
  fetching=false; btnFetch.disabled=false;
}

function renderList(){
  resList.innerHTML=resources.map((r,i)=>
    `<div class="res-item" onclick="preview(${i})">
      <input type="checkbox" ${r.checked!==false?'checked':''} onchange="r.checked=this.checked;updateCount()" onclick="event.stopPropagation()">
      <span class="res-type">[${r.rtype}]</span>
      <span class="res-name" title="${r.name}">${r.name}</span>
    </div>`
  ).join('');
  updateCount();
}

function preview(i){
  let r=resources[i];
  previewEl.innerHTML=`<b>${r.rtype}</b><br><br><b>文件名:</b> ${r.name}<br><br><b>URL:</b><br><small>${r.url}</small>`;
}

function selAll(){resources.forEach(r=>r.checked=true);renderList()}
function selNone(){resources.forEach(r=>r.checked=false);renderList()}
function updateCount(){
  let n=resources.filter(r=>r.checked!==false).length;
  selCount.textContent=`已选 ${n}`;
}

function setStatus(t,c){
  statusText.textContent=t; statusText.style.color=c||'#c9d1d9';
}

async function startDL(){
  let checked=resources.filter(r=>r.checked!==false);
  if(!checked.length)return alert('请先勾选资源');
  downloading=true; dlLog=[];
  setStatus('📻 开始下载...','#58a6ff');
  progress.style.display='block';

  try{
    let data=await fetchAPI('/download',{method:'POST',body:JSON.stringify({resources:checked})});
    let taskId=data.taskId;
    pollProgress(taskId);
  }catch(e){setStatus('❌ '+e.message,'#f85149'); downloading=false}
}

async function pollProgress(taskId){
  try{
    let data=await fetchAPI('/progress?task='+taskId);
    if(data.done){
      progressBar.style.width='100%';
      statusPct.textContent='100%';
      setStatus(`✅ 完成: ${data.ok} 成功, ${data.fail} 失败`,'#3fb950');
      dlList.innerHTML=data.log.map(s=>`<div>${s}</div>`).join('');
      downloading=false; progress.style.display='none';
      return;
    }
    progressBar.style.width=data.pct+'%';
    statusPct.textContent=data.pct+'%';
    setStatus(`📥 ${data.status}`,'#58a6ff');
    if(data.log) dlList.innerHTML=data.log.map(s=>`<div>${s}</div>`).join('');
    if(downloading) setTimeout(()=>pollProgress(taskId),500);
  }catch(e){downloading=false}
}

function stopAll(){fetchAPI('/stop'); downloading=false}

function switchTab(t){dlTab=t; document.querySelectorAll('#dl-tabs span').forEach((s,i)=>s.className=i+1===t?'active':'')}

let [urlInput,btnFetch,resList,selCount,previewEl,progress,progressBar,statusText,statusPct,dlList] =
  ['url-input','btn-fetch','res-list','sel-count','preview','progress','progress-bar','status-text','status-pct','dl-list']
  .map(id=>document.getElementById(id));
</script>
</body>
</html>
